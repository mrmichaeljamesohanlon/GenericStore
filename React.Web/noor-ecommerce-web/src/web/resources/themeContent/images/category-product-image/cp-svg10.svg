<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#3E1F00"/>
    </linearGradient>
    <linearGradient id="piston" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFECB3"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <rect width="300" height="200" rx="12" fill="url(#bg10)"/>
  <!-- Cylinder bore -->
  <rect x="110" y="20" width="80" height="130" rx="10" fill="#5D2E00" stroke="#FF8F00" stroke-width="3"/>
  <!-- Piston -->
  <rect x="118" y="70" width="64" height="60" rx="6" fill="url(#piston)"/>
  <!-- Piston rings -->
  <line x1="118" y1="82" x2="182" y2="82" stroke="#FF8F00" stroke-width="4"/>
  <line x1="118" y1="95" x2="182" y2="95" stroke="#FF8F00" stroke-width="4"/>
  <!-- Piston crown surface -->
  <rect x="118" y="70" width="64" height="12" rx="3" fill="#FFD700"/>
  <!-- Connecting rod -->
  <rect x="143" y="130" width="14" height="55" rx="7" fill="#FFCA28"/>
  <!-- Big end -->
  <ellipse cx="150" cy="185" rx="22" ry="12" fill="#FFCA28" stroke="#F57F17" stroke-width="3"/>
  <circle cx="150" cy="185" r="7" fill="#3E1F00"/>
  <!-- Compression lines -->
  <path d="M118,68 L150,40 L182,68" fill="none" stroke="#FF8F00" stroke-width="3" stroke-linejoin="round"/>
  <!-- Spark at top -->
  <circle cx="150" cy="30" r="8" fill="#FFD700" opacity="0.9"/>
  <path d="M147,22 L143,14 L150,20 L146,10" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
</svg>
