<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#00243A"/>
    </linearGradient>
    <linearGradient id="hose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
  </defs>
  <rect width="300" height="200" rx="12" fill="url(#bg9)"/>
  <!-- Brake hose body -->
  <path d="M50,100 C80,50 150,150 250,100" fill="none" stroke="url(#hose)" stroke-width="18" stroke-linecap="round"/>
  <!-- End fittings -->
  <rect x="30" y="86" width="28" height="28" rx="6" fill="#80DEEA" stroke="#00ACC1" stroke-width="3"/>
  <rect x="242" y="86" width="28" height="28" rx="6" fill="#80DEEA" stroke="#00ACC1" stroke-width="3"/>
  <!-- Fitting holes -->
  <circle cx="44" cy="100" r="7" fill="#00243A"/>
  <circle cx="256" cy="100" r="7" fill="#00243A"/>
  <!-- Braiding pattern lines -->
  <path d="M70,82 C90,62 110,118 130,98" fill="none" stroke="#E0F7FA" stroke-width="2.5" opacity="0.6"/>
  <path d="M100,105 C120,85 140,141 160,121" fill="none" stroke="#E0F7FA" stroke-width="2.5" opacity="0.6"/>
  <path d="M140,98 C160,78 180,134 200,114" fill="none" stroke="#E0F7FA" stroke-width="2.5" opacity="0.6"/>
  <!-- Quick connector highlight -->
  <circle cx="44" cy="100" r="14" fill="none" stroke="#FFD700" stroke-width="3"/>
  <circle cx="256" cy="100" r="14" fill="none" stroke="#FFD700" stroke-width="3"/>
</svg>
