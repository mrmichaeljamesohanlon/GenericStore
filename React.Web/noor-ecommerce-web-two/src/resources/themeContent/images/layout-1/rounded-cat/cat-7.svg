  <!-- Checkered pattern on flag -->
  <rect x="75" y="40" width="17" height="14" fill="white" opacity="0.85"/>
  <rect x="109" y="40" width="17" height="14" fill="white" opacity="0.85"/>
  <rect x="92" y="54" width="17" height="14" fill="white" opacity="0.85"/>
  <rect x="126" y="54" width="17" height="14" fill="white" opacity="0.85"/>
  <rect x="75" y="68" width="17" height="14" fill="white" opacity="0.85"/>
  <rect x="109" y="68" width="17" height="14" fill="white" opacity="0.85"/>
  <rect x="92" y="82" width="17" height="14" fill="white" opacity="0.85"/>
  <rect x="126" y="82" width="17" height="13" fill="white" opacity="0.85"/>
  <!-- Stars decoration -->
  <circle cx="40" cy="80" r="5" fill="#FFD700"/>
