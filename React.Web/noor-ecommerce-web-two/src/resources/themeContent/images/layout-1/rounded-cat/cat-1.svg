<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6C3CE1"/>
      <stop offset="100%" stop-color="#1A0A3B"/>
    </radialGradient>
    <linearGradient id="rim1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6BDB"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg1)"/>
  <!-- Steering wheel -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="url(#rim1)" stroke-width="10"/>
  <circle cx="100" cy="100" r="15" fill="#FF6BDB"/>
  <!-- Spokes -->
  <line x1="100" y1="85" x2="100" y2="50" stroke="#FF6BDB" stroke-width="7" stroke-linecap="round"/>
  <line x1="100" y1="115" x2="100" y2="150" stroke="#FF6BDB" stroke-width="7" stroke-linecap="round"/>
  <line x1="85" y1="100" x2="50" y2="100" stroke="#FF6BDB" stroke-width="7" stroke-linecap="round"/>
  <line x1="115" y1="100" x2="150" y2="100" stroke="#FF6BDB" stroke-width="7" stroke-linecap="round"/>
  <!-- Decorative dots -->
  <circle cx="100" cy="42" r="5" fill="#FFD700"/>
  <circle cx="100" cy="158" r="5" fill="#FFD700"/>
  <circle cx="42" cy="100" r="5" fill="#FFD700"/>
  <circle cx="158" cy="100" r="5" fill="#FFD700"/>
</svg>
